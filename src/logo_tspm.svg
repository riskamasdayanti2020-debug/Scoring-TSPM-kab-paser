<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Outer glowing gold circle mapping to the Tapak Suci identity -->
  <circle cx="50" cy="50" r="46" fill="#8B0000" stroke="#FFD700" stroke-width="4" />
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#FFD700" stroke-dasharray="2,2" stroke-width="1" />
  
  <!-- Green central circle representing faith and holiness -->
  <circle cx="50" cy="50" r="28" fill="#1b4d3e" stroke="#FFD700" stroke-width="2" />
  
  <!-- Left Side: Staged Yellow Crescent of Muhammadiyah -->
  <path d="M 46,26 A 24,24 0 0,0 46,74 A 20,20 0 0,1 46,26 Z" fill="#FFD700" opacity="0.9" />

  <!-- The benchmark Hand of Tapak Suci (Sikap Mawar - Open hand with bent thumb) -->
  <!-- We draw a stylized right hand in yellow/gold, with finger lines and the thumb tucked in -->
  <g transform="translate(1, -1)">
    <!-- Palm & wrist -->
    <path d="M 48,65 L 53,65 L 55,60 L 55,48 L 47,48 L 46,55 Z" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
    
    <!-- Index Finger -->
    <rect x="47" y="38" width="2" height="11" rx="1" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
    
    <!-- Middle Finger -->
    <rect x="49.5" y="36" width="2" height="13" rx="1" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
    
    <!-- Ring Finger -->
    <rect x="52" y="37" width="2" height="12" rx="1" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
    
    <!-- Little Finger (Kelingking) -->
    <rect x="54.5" y="40" width="1.8" height="9" rx="0.9" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
    
    <!-- Bent Thumb (Ibu Jari Menekuk) - symbolizing humility -->
    <path d="M 47,49 C 43,50 41,53 43,55 C 44.5,56.5 47,54 47,51 Z" fill="#FFD700" stroke="#1b4d3e" stroke-width="0.5" />
  </g>

  <!-- Red Jasmine / Rose (Melati / Mawar) next to the hand -->
  <g transform="translate(58, 54)">
    <!-- Flower petals -->
    <circle cx="0" cy="-4" r="3.5" fill="#FF0000" stroke="#FFD700" stroke-width="0.5" />
    <circle cx="-3.5" cy="0" r="3.5" fill="#FF0000" stroke="#FFD700" stroke-width="0.5" />
    <circle cx="3.5" cy="0" r="3.5" fill="#FF0000" stroke="#FFD700" stroke-width="0.5" />
    <circle cx="-2" cy="4" r="3.5" fill="#FF0000" stroke="#FFD700" stroke-width="0.5" />
    <circle cx="2" cy="4" r="3.5" fill="#FF0000" stroke="#FFD700" stroke-width="0.5" />
    <!-- Flower core -->
    <circle cx="0" cy="1" r="2" fill="#FFD700" />
  </g>

  <!-- Star of Muhammadiyah rays surrounding the inner circle (abstract subtle triangles) -->
  <g stroke="#FFD700" stroke-width="1.5" opacity="0.6">
    <line x1="50" y1="12" x2="50" y2="18" />
    <line x1="50" y1="88" x2="50" y2="82" />
    <line x1="12" y1="50" x2="18" y2="50" />
    <line x1="88" y1="50" x2="82" y2="50" />
    <line x1="23.5" y1="23.5" x2="27.5" y2="27.5" />
    <line x1="76.5" y1="76.5" x2="72.5" y2="72.5" />
    <line x1="23.5" y1="76.5" x2="27.5" y2="72.5" />
    <line x1="76.5" y1="23.5" x2="72.5" y2="27.5" />
  </g>
</svg>
